services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ${BACKEND_CONTAINER_NAME:-alfa-hackiton-backend-prod}
    environment:
      DB_PATH: ${DB_PATH:-/app/data/app.db}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-60}
      OPENROUTER_MAX_RETRIES: ${OPENROUTER_MAX_RETRIES:-3}
      OPENROUTER_RETRY_SECONDS: ${OPENROUTER_RETRY_SECONDS:-20}
      OPENROUTER_REQUEST_DELAY_SECONDS: ${OPENROUTER_REQUEST_DELAY_SECONDS:-0}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5000}:5000"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
    restart: unless-stopped
