services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ${BACKEND_CONTAINER_NAME:-alfa-hackiton-backend-prod}
    environment:
      DB_PATH: ${DB_PATH:-/app/data/app.db}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5000}:5000"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
    restart: unless-stopped
