services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ${BACKEND_CONTAINER_NAME:-alfa-hackiton-backend-prod}
    environment:
      DB_PATH: ${DB_PATH:-/app/data/app.db}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      UPDATE_PARSER_ONLY: ${UPDATE_PARSER_ONLY:-0}
      PARSER_ONLY_SOURCE_IDS: ${PARSER_ONLY_SOURCE_IDS:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5000}:5000"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
    restart: unless-stopped

  frontend-backend:
    build:
      context: ./front/my-app/backend
      dockerfile: Dockerfile
    container_name: ${FRONT_BACKEND_CONTAINER_NAME:-alfa-hackiton-frontend-backend-prod}
    environment:
      MAIN_DB_PATH: ${DB_PATH:-/app/data/app.db}
      FRONT_BACKEND_DB_PATH: /app/data/redcat.db
      UPDATE_API_URL: http://backend:5000/update
      UPDATE_STATUS_URL: http://backend:5000/update/status
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-redcat-secret-key-change-me-32-bytes}
    ports:
      - "127.0.0.1:${FRONT_BACKEND_PORT:-5001}:5001"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
    container_name: ${FRONTEND_CONTAINER_NAME:-alfa-hackiton-frontend-prod}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
      - frontend-backend
    restart: unless-stopped
